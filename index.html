<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Cadastro</title>
  <link rel="stylesheet" href="./index.css">
</head>
<body>

  <header>
    <h1>Sistema de Cadastro</h1>
    <nav>
      <ul>
        <li><a href="#">Início</a></li>
        <li><a href="#">Formulário</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h2>Preencha o formulário abaixo</h2>
      <form action="#" method="post">
        <label class="label_nome" for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required><br><br>

        <label class="label_email" for="email">E-mail:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label  class="label_senha" for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required><br><br>

        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <footer>
    <p id="p_footer">&copy; 2026 - Desenvolvido por José Henrique Ribeiro Bonetti</p>
  </footer>

</body>
</html>
